<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MG24 PREMIUM VPS - LOGIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #000; color: #0f0; font-family: monospace; }</style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="p-8 border-2 border-green-500 rounded-lg shadow-lg shadow-green-500/20 text-center">
        <h1 class="text-2xl font-bold mb-6">ALBI VPS ACCESS</h1>
        <input type="password" id="pass" placeholder="Password" class="bg-black border border-green-500 p-2 rounded w-full mb-4 text-center outline-none text-green-500">
        <button onclick="login()" class="bg-green-500 text-black font-bold py-2 px-8 rounded hover:bg-green-400 w-full transition">AUTHENTICATE</button>
    </div>
    <script>
        async function login() {
            const password = document.getElementById('pass').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password })
            });
            if (res.ok) { window.location.href = '/dashboard.html'; }
            else { alert('Access Denied!'); }
        }
    </script>
</body>
</html>
