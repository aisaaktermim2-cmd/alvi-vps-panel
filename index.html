<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHANTO - DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #33ffff; --bg: #000000; --card-bg: #0a0a0a; }
        body { background: var(--bg); color: #fff; font-family: 'Consolas', monospace; }
        .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; background: var(--card-bg); border-right: 2px solid var(--primary); z-index: 1000; transition: 0.3s; }
        .sidebar.open { left: 0; }
        .main-view { display: none; padding: 20px; }
        .main-view.active { display: block; }
        .theme-gradient { background: linear-gradient(to right, #33ffff, #ff80ff); color: black; }
    </style>
</head>
<body>
    <div class="bg-black border-b border-[#33ffff] p-4 flex items-center justify-between sticky top-0 z-50">
        <button onclick="toggleSidebar()" class="text-[#33ffff] text-2xl"><i class="fas fa-bars"></i></button>
        <h1 class="font-bold">SHANTO VPS</h1>
        <div class="text-[10px]">CPU: 18%</div>
    </div>

    <div class="sidebar" id="sidebar">
        <div class="p-6 text-center border-b border-[#33ffff]">
            <h2 class="text-xl font-bold">MENU</h2>
        </div>
        <div class="p-4 space-y-2">
            <div class="p-3 hover:bg-white/10 cursor-pointer" onclick="switchView('dashboard')"><i class="fas fa-home mr-2"></i> Dashboard</div>
            <div class="p-3 hover:bg-white/10 cursor-pointer" onclick="switchView('packages')"><i class="fas fa-cubes mr-2"></i> Packages</div>
            <div class="p-3 hover:bg-white/10 cursor-pointer" onclick="location.href='/logout'"><i class="fas fa-sign-out-alt mr-2"></i> Logout</div>
        </div>
    </div>

    <div id="dashboard-view" class="main-view active">
        <div class="border-2 border-dashed border-[#33ffff] p-4 rounded-xl mb-6">
            <h3 class="text-xs font-bold mb-3 uppercase">Upload New File</h3>
            <form action="/upload" method="POST" enctype="multipart/form-data" class="flex flex-col gap-2">
                <input type="file" name="pythonFile" accept=".py" class="text-xs">
                <button type="submit" class="theme-gradient py-2 font-bold rounded">DEPLOY</button>
            </form>
        </div>
        
        <div class="bg-[#0a0a0a] p-4 rounded-xl border-l-4 border-[#33ffff]">
            <h3 class="font-bold">TCP-FREE</h3>
            <div class="flex gap-2 mt-4 text-xs">
                <a href="/action/TCP-FREE/start" class="text-green-400 border border-green-400 px-3 py-1 rounded">START</a>
                <a href="/action/TCP-FREE/stop" class="text-red-400 border border-red-400 px-3 py-1 rounded">STOP</a>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function switchView(viewId) {
            document.querySelectorAll('.main-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId + '-view').classList.add('active');
            toggleSidebar();
        }
    </script>
</body>
</html>
