<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İBOEXE - MG24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d4d;
            --bg: #000000;
            --card-bg: #0a0a0a;
            --text: #ffffff;
        }
        
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; }
        .card-bg { background: var(--card-bg); border: 1px solid rgba(255, 77, 77, 0.2); }
        
        .sidebar {
            position: fixed; left: -280px; top: 0; bottom: 0; width: 280px;
            background: var(--card-bg); border-right: 2px solid var(--primary);
            z-index: 1000; transition: left 0.3s ease;
        }
        .sidebar.open { left: 0; }
        
        .sidebar-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 999; display: none;
        }
        .sidebar-overlay.open { display: block; }

        .main-view { display: none; }
        .main-view.active { display: block; }
        
        .stats-number { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    
    <div class="sidebar" id="sidebar">
        <div class="p-6 text-center border-b border-red-500/20">
            <h2 class="text-xl font-bold text-red-500">İBOEXE</h2>
            <p class="text-[10px] opacity-50 mt-1 uppercase">ALBI Dakshata Sperm</p>
        </div>
        <div class="mt-4">
            <div class="p-4 hover:bg-red-500/10 cursor-pointer" onclick="switchView('dashboard')"><i class="fas fa-home mr-3"></i> Dashboard</div>
            <div class="p-4 hover:bg-red-500/10 cursor-pointer" onclick="switchView('packages')"><i class="fas fa-cubes mr-3"></i> Package Manager</div>
            <div class="p-4 hover:bg-red-500/10 cursor-pointer" onclick="switchView('telegram')"><i class="fab fa-telegram mr-3"></i> Telegram Bot</div>
            <div class="p-4 hover:bg-red-500/10 cursor-pointer text-red-500 mt-10" onclick="location.href='/'"><i class="fas fa-sign-out-alt mr-3"></i> Logout</div>
        </div>
    </div>

    <div class="bg-black/90 border-b border-red-500/30 p-4 sticky top-0 z-50 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="text-red-500 text-2xl"><i class="fas fa-bars"></i></button>
            <h1 class="text-lg font-bold text-red-500">İBOEXE</h1>
        </div>
        <div class="text-[10px] font-mono">
            CPU: <span id="cpu-usage" class="stats-number">0%</span> | 
            RAM: <span id="ram-usage" class="stats-number">0%</span>
        </div>
    </div>

    <div id="dashboard-view" class="main-view active p-4">
        <div class="grid grid-cols-2 gap-4 mt-4">
            <div class="card-bg p-4 rounded-xl text-center">
                <span class="text-2xl stats-number">0</span>
                <p class="text-[10px] opacity-50 uppercase">Running</p>
            </div>
            <div class="card-bg p-4 rounded-xl text-center">
                <span class="text-2xl stats-number">1</span>
                <p class="text-[10px] opacity-50 uppercase">Total</p>
            </div>
        </div>

        <div class="mt-8 card-bg rounded-2xl p-5 border-l-4 border-red-600">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="font-bold text-lg">Hjii Project</h3>
                    <p class="text-[10px] opacity-50">python3 main.py</p>
                </div>
                <span class="bg-red-500/10 text-red-500 text-[10px] px-2 py-1 rounded border border-red-500/20">STOPPED</span>
            </div>
            <div class="flex gap-2">
                <button class="flex-1 bg-red-500/10 border border-red-500 py-2 rounded text-red-500"><i class="fas fa-play"></i></button>
                <button class="flex-1 bg-gray-900 py-2 rounded"><i class="fas fa-cog"></i></button>
                <button class="flex-1 bg-red-900/20 text-red-500 py-2 rounded"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </div>

    <div id="packages-view" class="main-view p-4"><h2 class="text-xl font-bold">Package Manager</h2><p class="mt-4 opacity-50">No packages installed.</p></div>
    <div id="telegram-view" class="main-view p-4"><h2 class="text-xl font-bold">Telegram Bot</h2><p class="mt-4 opacity-50">Deploy your bot token here.</p></div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        function switchView(viewId) {
            document.querySelectorAll('.main-view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId + '-view').classList.add('active');
            toggleSidebar();
        }

        async function updateStats() {
            try {
                const res = await fetch('/system_stats');
                const data = await res.json();
                document.getElementById('cpu-usage').innerText = data.cpu + '%';
                document.getElementById('ram-usage').innerText = data.ram + '%';
            } catch (e) { console.log("Stats update failed"); }
        }
        setInterval(updateStats, 2000);
    </script>
</body>
</html>
